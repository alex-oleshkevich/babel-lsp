name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Tag matches Cargo.toml
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          ref="${DISPATCH_TAG:-$GITHUB_REF_NAME}"
          tag="${ref#v}"
          crate=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[0].version')
          test "$tag" = "$crate" || {
            echo "tag $tag != Cargo.toml $crate"; exit 1; }

  build:
    needs: version-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-latest,  name: linux-x86_64  }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest,  name: linux-aarch64, cross: true }
          - { target: x86_64-apple-darwin,       os: macos-latest,   name: macos-x86_64  }
          - { target: aarch64-apple-darwin,       os: macos-latest,   name: macos-aarch64 }
          - { target: x86_64-pc-windows-msvc,    os: windows-latest, name: windows-x86_64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --locked
      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }}
      - name: Build
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }}
      - name: Strip binary
        if: runner.os != 'Windows' && matrix.cross != true
        run: strip target/${{ matrix.target }}/release/babel-lsp
      - name: Rename artifact
        shell: bash
        run: |
          ext=""
          [[ "${{ runner.os }}" == "Windows" ]] && ext=".exe"
          cp "target/${{ matrix.target }}/release/babel-lsp${ext}" \
             "babel-lsp-${{ matrix.name }}${ext}"
      - uses: actions/upload-artifact@v4
        with:
          name: babel-lsp-${{ matrix.name }}
          path: babel-lsp-${{ matrix.name }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: editors/zed
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Package Zed extension
        run: ./scripts/package-zed-extension.sh dist/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/**
          generate_release_notes: true

  publish-aur:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          GH_REPO: ${{ github.repository }}
          GH_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          VERSION="${GH_TAG#v}"

          CHECKSUM_X86=$(curl -sL \
            "https://github.com/${GH_REPO}/releases/download/${GH_TAG}/babel-lsp-linux-x86_64" \
            | sha256sum | cut -d' ' -f1)
          CHECKSUM_ARM=$(curl -sL \
            "https://github.com/${GH_REPO}/releases/download/${GH_TAG}/babel-lsp-linux-aarch64" \
            | sha256sum | cut -d' ' -f1)

          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur_rsa
          chmod 600 ~/.ssh/aur_rsa
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts

          if git clone -c core.sshCommand="ssh -i ~/.ssh/aur_rsa" \
              ssh://aur@aur.archlinux.org/babel-lsp.git /tmp/aur; then
            echo "Updating existing AUR package"
          else
            echo "Initialising new AUR package"
            mkdir /tmp/aur
            git -C /tmp/aur init
            git -C /tmp/aur remote add origin ssh://aur@aur.archlinux.org/babel-lsp.git
          fi

          sed \
            -e "s/^pkgver=.*/pkgver=${VERSION}/" \
            -e "s/^pkgrel=.*/pkgrel=1/" \
            -e "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${CHECKSUM_X86}')/" \
            -e "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${CHECKSUM_ARM}')/" \
            pkg/aur/PKGBUILD > /tmp/aur/PKGBUILD

          docker run --rm -v /tmp/aur:/pkg archlinux:base-devel \
            bash -c "useradd -m builder && chmod 777 /pkg && su builder -c 'cd /pkg && makepkg --printsrcinfo'" \
            > /tmp/aur/.SRCINFO

          cd /tmp/aur
          git config user.email "ci@babel-lsp.dev"
          git config user.name "babel-lsp CI"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "bump to ${VERSION}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/aur_rsa" git push origin HEAD:master

  build-wheels:
    needs: version-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --strip
          sccache: true
          manylinux: 2_28
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: target/wheels/

  publish-pypi:
    needs: [release, build-wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - name: List dist
        run: find dist -type f | sort
      - uses: astral-sh/setup-uv@v4
      - run: uv publish --skip-existing dist/*.whl
